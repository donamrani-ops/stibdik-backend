# ═══════════════════════════════════════════════════════════
#  STIBDIK - DOCKER COMPOSE
#  Backend API + MongoDB + Nginx
# ═══════════════════════════════════════════════════════════

version: '3.8'

services:
  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stibdik-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/stibdik
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - CMI_MERCHANT_ID=${CMI_MERCHANT_ID}
      - CMI_SECRET_KEY=${CMI_SECRET_KEY}
    depends_on:
      - mongo
    networks:
      - stibdik-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MongoDB Database
  mongo:
    image: mongo:6.0
    container_name: stibdik-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=stibdik
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - stibdik-network
    command: mongod --auth

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: stibdik-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - stibdik-network

  # Redis (Optional - for caching)
  redis:
    image: redis:7-alpine
    container_name: stibdik-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - stibdik-network
    command: redis-server --appendonly yes

networks:
  stibdik-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
  mongo-config:
    driver: local
  redis-data:
    driver: local
